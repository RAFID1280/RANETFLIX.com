<!DOCTYPE html>
<html>
    <head>
        <title>REGISTRSTION FORM</title>
        <style>
            body{
                font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
                justify-content: center;
                background-color: beige;
                align-items: center;
                height: 100vh;
                margin: 10px;

            }
            .form-box{
                width: 300px;
                margin: 50px;
                padding: 20px;
                background: rgb(255, 255, 255);
                border: 1px;
                border-radius: 5px;
                text-align: center;
            }
            input{
                width: 100%;
                padding: 8px;
                margin: 8px;
            }
            button{
                width: 100%;
                padding: 10px;
                background: green;
                color: black;
                border: none;
            }
            h1{
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class=".form-box">
        <h1>REGISTRATION FORM</h1>
        <form>
             NAME:<br>
                    <input type="text" placeholder="ENTER THE NAME"><br>
                    <br>

                    EMAIL ADDRESS:<br>
                    <input type="email" placeholder="ENTER THE EMAIL"><br>
                    <br>

                    

                    PHONE:<br>
                    <input type="tel" placeholder="ENTER THE PHONE NUMMBER"><br>
                    <br>

                    PASSWORD:<br>
                    <input type="password" placeholder="ENTER THE PASSWORD"><br>
                    <br>
                    
                    <button type="submit">CREATE ACCOUNT</button><br>
                    <br>
            </form>
        </div>
    </body>
</html>
