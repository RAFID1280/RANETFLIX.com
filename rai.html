<!DOCTYPE html>
<html>
    <head>
        <title>SIMPLE REGISTRATION FORM</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="rai.css">

    </head>

    <body>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Navbar</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                        <a class="nav-link" href="#">Features</a>
                        <a class="nav-link" href="#">Pricing</a>
                        <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                    </div>
                </div>
            </div>
        </nav>
      
        <center>
        <div class="form-box">
            <h1>REGISTER FORM</h1>

            <form>
                NAME:<br>
                <input type="text" placeholder="ENTER THE NAME"><br>
                <br>

                
                EMAIL:<br>
                <input type="email" placeholder="ENTER THE MAIL"><br>
                <br>

                PASSWORD:<br>
                <input type="password" placeholder="ENTER THE PASSWORD"><br>
                <br>

                CONFIRM PASSWORD:<br>
                <input type="password" placeholder="CONFIRM THE PASSWORD"><br>
                <br>

                ADDRESS:<br>
                <textarea rows=4 cols=36 placeholder="ENTER YOUR ADDRESS"></textarea><br>
                <br>

                SELECT YOUR COUNTRY:<br>
                <select class="select" aria-label="Default select example">
                    <option selected>SELECT YOUR COUNTRY</option>
                    <option value="1">INDIA</option>
                    <option value="2">U.S.A</option>
                    <option value="3">U.A.E</option>
                </select><br>
                <br>

                
                PHONE NUMMBER:<br>
                <input type="tel" placeholder="ENTER THE PHONE NUMMBER"><br>
                <br>

                <button type="submit">REGISTER</button><br>
                <br>

            
            </form>
        </div>

         <footer>
            <p>&copy; 2026 Your Brand. Built with passion.</p>
        </footer><br>
        <br>
    </center>
    </body>
</html>
