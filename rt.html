<!DOCTYPE html>
<html>
    <head>
        <title>REGISTRATION FORM</title>

    </head>

<body bgcolor="white">
    <h2>REGISTRATION FORM </h2>
    <form>
        <center>
        NAME:<br>

        <input type="text" placeholder="enter the name"><br>
        <br>
        

        PASSWORD:<br>
        <input type="password" placeholder="enter the password"><br>
        <br>
       
        ADDRESS:<br>
        <textarea rows=4 cols=30></textarea><br>
        <br>

        GENDER:<br>
        <input type="radio" name="m">MALE
        <input type="radio" name="m">FEMALE
        <input type="radio" name="m">OTHER<br>
        <br>
        EMAIL:<br>
        <input type="email" placeholder="enter the mail"><br>
        <br>
        <button type="submit">REGISTER</button>
        </center>
        
        
    </form>
</body>
</html>
